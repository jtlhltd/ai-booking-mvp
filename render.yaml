services:
  - type: web
    name: ai-booking-mvp
    env: node
    # Install devDependencies so Jest + policy run; same gate as local `npm run test:ci`
    # (plain `npm test` skips policy, route inventories, coverage, and leak lane — can diverge from CI).
    buildCommand: npm ci --include=dev && npm run test:ci
    startCommand: npm run render-start
    plan: starter
    envVars:
      - key: NODE_VERSION
        value: 18
      # Set once via Dashboard or scripts/sync-self-heal-env-to-render.ps1 (sync: false keeps values across deploys)
      - key: CURSOR_SELF_HEAL_WEBHOOK_URL
        sync: false
      - key: CURSOR_SELF_HEAL_WEBHOOK_AUTH
        sync: false
      - key: SENTRY_SELF_HEAL_RELAY_SECRET
        sync: false
