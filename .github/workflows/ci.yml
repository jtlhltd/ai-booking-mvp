# Continuous integration: install dependencies and run Jest on every push and PR.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      RUN_DB_INTEGRATION_TESTS: "1"
      RUN_SQLITE_INTEGRATION_TESTS: "1"
      RUN_POSTGRES_SMOKE_TESTS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node-version: [20]

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      RUN_DB_INTEGRATION_TESTS: "1"
      RUN_SQLITE_INTEGRATION_TESTS: "1"
      RUN_POSTGRES_SMOKE_TESTS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Start Postgres (Docker)
        run: |
          docker run -d --name testdb -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=testdb -p 5432:5432 postgres:15-alpine
          docker ps

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Dump Postgres logs (on failure)
        if: failure()
        run: docker logs testdb
