# Continuous integration: install dependencies and run Jest on every push and PR.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run route inventories
        run: npm run test:route-inventory && npm run test:server-inline-inventory

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration-lite (routes + db contracts)
        run: npm run test:integration-lite

      - name: Run coverage
        run: npm run test:coverage

  integration-native:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'pull_request'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      RUN_DB_INTEGRATION_TESTS: "1"
      RUN_SQLITE_INTEGRATION_TESTS: "1"
      RUN_POSTGRES_SMOKE_TESTS: "1"
      TZ: UTC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3
        run: npm rebuild better-sqlite3

      - name: Run integration tests (opt-in suite)
        run: npm test -- tests/integration

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run route inventories
        run: npm run test:route-inventory && npm run test:server-inline-inventory

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration-lite (routes + db contracts)
        run: npm run test:integration-lite

      - name: Run coverage
        run: npm run test:coverage

      # NOTE: Windows job intentionally avoids native SQLite integration tests, since
      # better-sqlite3 bindings can be toolchain-sensitive on Windows. The optional
      # `integration-native` job covers those.
